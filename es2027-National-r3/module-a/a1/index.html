<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        width: auto;
        height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 58px;
    }

    .he1, .he2 {
        position: absolute;
        width: 80px;
        height: 50px;
        background-color: red;
        border-radius: 50% 0 0 50%;
    }

    .he1 {
        rotate: 135deg;
        left: 0;
    }

    .he2 {
        rotate: 45deg;
        right: 0
    }
</style>
<body>
    <div class="container">
        <div class="he1"></div>
        <div class="he2"></div>
    </div>
</body>
</html>
